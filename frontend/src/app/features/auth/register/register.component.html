<div class="min-h-screen flex items-center justify-center px-4" style="background-color: var(--color-bg-base)">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="text-2xl font-bold text-gradient">Mirra</a>
      <p class="mt-2 text-sm" style="color: var(--color-text-muted)">Create your account</p>
    </div>

    <!-- Card -->
    <div class="p-8 rounded-2xl border" style="background-color: var(--color-bg-surface); border-color: var(--color-border)">

      @if (error()) {
        <div class="mb-5 px-4 py-3 rounded-xl text-sm border" style="background-color: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: var(--color-error)">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
        <app-input
          formControlName="email"
          label="Email"
          type="email"
          placeholder="you@example.com"
          [control]="form.get('email')"
        />

        <app-input
          formControlName="password"
          label="Password"
          type="password"
          placeholder="Min. 8 characters"
          [control]="form.get('password')"
        />

        <app-button type="submit" [loading]="loading()" [fullWidth]="true" class="mt-1">
          Create account
        </app-button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center mt-6 text-sm" style="color: var(--color-text-muted)">
      Already have an account?
      <a routerLink="/auth/login" class="font-medium ml-1" style="color: var(--color-accent-solid)">
        Sign in
      </a>
    </p>

    <!-- Disclaimer -->
    <p class="text-center mt-4 text-xs px-4" style="color: var(--color-text-muted)">
      By creating an account, you agree to our Terms of Service and take full responsibility for any personas you create.
    </p>

  </div>
</div>
